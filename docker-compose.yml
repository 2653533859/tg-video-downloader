version: '3.8'

services:
  tg-downloader:
    build: .
    container_name: tg-downloader-aria2-relay
    network_mode: "host"
    volumes:
      - /root/downloads:/app/downloads
      - .:/app  # 映射当前目录以持久化 session 文件
      - /usr/local/bin/tdl:/usr/local/bin/tdl:ro
      - /root/.tdl:/root/.tdl
    environment:
      - TG_API_ID=${TG_API_ID}
      - TG_API_HASH=${TG_API_HASH}
      - DOWNLOAD_DIR=downloads
      - SESSION_NAME=tg_downloader
      - TG_PROXY_ENABLED=${TG_PROXY_ENABLED:-true}
      - TG_PROXY_TYPE=${TG_PROXY_TYPE:-http}
      - TG_PROXY_HOST=${TG_PROXY_HOST:-127.0.0.1}
      - TG_PROXY_PORT=${TG_PROXY_PORT:-7890}
      - WEB_BIND_HOST=${WEB_BIND_HOST:-127.0.0.1}
      - WEB_BIND_PORT=${WEB_BIND_PORT:-5003}
      - WEB_AUTH_USERNAME=${WEB_AUTH_USERNAME:-}
      - WEB_AUTH_PASSWORD=${WEB_AUTH_PASSWORD:-}
      - DEBUG_API_ENABLED=${DEBUG_API_ENABLED:-false}
      - OPEN_FOLDER_ENABLED=${OPEN_FOLDER_ENABLED:-false}
      - TRUST_FORWARDED_FOR=${TRUST_FORWARDED_FOR:-false}
      - RELAY_TOKEN_SECRET=${RELAY_TOKEN_SECRET:-}
      - RELAY_TOKEN_TTL=${RELAY_TOKEN_TTL:-1800}
      - PUBLIC_BASE_URL=${PUBLIC_BASE_URL:-}
      - HTTP_PROXY=${HTTP_PROXY:-http://127.0.0.1:7890}
      - HTTPS_PROXY=${HTTPS_PROXY:-http://127.0.0.1:7890}
      - ALL_PROXY=${ALL_PROXY:-http://127.0.0.1:7890}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "sh", "/app/healthcheck.sh"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 30s
